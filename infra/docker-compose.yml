services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./../data/postgres:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30


  api:
    build: ../apps/api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      FILES_ROOT: /data/files
    volumes:
      - ./../data/files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  portal:
    build:
      context: ../apps/portal
      args:
        NEXT_PUBLIC_API_URL: https://api.grupo-loros.com
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.grupo-loros.com
      PORT: 3000
    depends_on:
      api:
        condition: service_started
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      FILES_ROOT: /data/files
    volumes:
      - ./../data/files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on: [api, portal]
    networks: [internal]

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file:
      - ./.env
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks: [internal]

networks:
  internal:
    driver: bridge
